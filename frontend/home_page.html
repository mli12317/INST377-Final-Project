<html>
    <head>
        <title>Home Page</title>
        <link rel="stylesheet" href="style.css">
        <script src="app.js" defer></script>
        <!-- 2 JS Libraries -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    </head>

    <body>
        <header class="navigation">
            <h1 class="logo">Interactive Art Explorer</h1>

            <!-- Navigation -->
             <nav>
                <ul>
                    <li><a href="home_page.html">Home</a></li>
                    <li><a href="about_page.html">About</a></li>
                    <li><a href="help_page.html">Help</a></li>
                </ul>
             </nav>
        </header>

        <!-- Main Section -->
         <main class="main-section">

            <section class="content">
                <h1>Explore Art, Accessible & Simplified.</h1>

                 <!-- Search Box -->
                <form onsubmit="searchArt(event)">
                    <input type="search" id="searchInput">
                    <button type="submit">Search</button>
                </form>

                <!-- Swiper JS Library -->
                 <div class="swiper mySwiper">
                    <div class="swiper-wrapper" id="swiperWrapper">
                        <!-- Slides Inserted Here dynamically -->
                    </div>

                    <!-- Navigation Buttons -->
                     <div class="swiper-button-prev"></div>
                     <div class="swiper-button-next"></div>

                     <!-- Pagination -->
                      <div class="swiper-pagination"></div>
                 </div>

                <!-- Artwork -->
                 <section id="artworkResults" class="artwork-results"></section>

                 <h3>Art by Classification</h3>
                <div style="width: 650px; height: 650px;">
                    <canvas id="classificationChart"></canvas>
                </div>

            </section>  

            <aside class="filters">
                <!-- Sidebar (Browse by Category) -->
                 <h3>Browse by Category</h3>

                 <form id="filterForm">
                    <!-- Artist -->
                    <label for="artist">Artist</label>
                    <select id="artist" required></select>

                    <!-- Classification -->
                    <label for="classification">Classification</label>
                    <select id="classification" required></select>

                    <!-- Submit -->
                     <button type="submit">Apply Filters</button>
                </form>

                <!-- Image -->
                 <img src="https://chipublib.bibliocommons.com/events/uploads/images/full/6772c070ac18b27593700eca9012206f/artic445x445.jpg" alt="Art Institute of Chicago API Logo" width="300">
            </aside>

         </main>
         
    </body>

</html>
